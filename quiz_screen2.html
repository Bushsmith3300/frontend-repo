<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Standard Chemistry Questions for Ghanaian SHS Learners!">
  <meta name="author" content="Emmanuel Asiamah Amponsah">
  <title>Chemistry Quiz</title>

  <style>
    * { margin:0; padding:0; box-sizing:border-box; }

    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      min-height: 100vh;
      background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
      color: white;
      display: flex;
      flex-direction: column;
    }

    .container {
      max-width: 850px;
      margin: 40px auto;
      padding: 20px;
      flex: 1;
    }

    h1 {
      text-align: center;
      font-size: 3rem;
      margin-bottom: 10px;
      background: linear-gradient(to right, #00ffea, #ff00cc);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .subtitle {
      text-align: center;
      margin-bottom: 40px;
      opacity: 0.85;
      font-size: 1.1rem;
    }

    #loading { text-align:center; margin-top:80px; }

    #loading p {
      margin-top: 15px;
      font-size: 1.3rem;
      color: #00ffea;
    }

    .spinner {
      width: 65px;
      height: 65px;
      margin:auto;
      border:6px solid rgba(255,255,255,0.15);
      border-top:6px solid #00ffea;
      border-radius:50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .question-card {
      background: rgba(255,255,255,0.08);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.15);
      padding: 35px;
      border-radius: 20px;
      margin-bottom: 30px;
    }

    #progress {
      text-align:center;
      font-size:1.3rem;
      margin-bottom:20px;
      font-weight:600;
      color:#00ffea;
    }

    h2 {
      font-size: 1.7rem;
      line-height: 1.6;
      margin-bottom: 35px;
    }

    .options button {
      width: 100%;
      padding: 18px 22px;
      margin: 14px 0;
      font-size: 1.2rem;
      border-radius: 14px;
      background: rgba(255,255,255,0.07);
      color: white;
      border: 1px solid rgba(255,255,255,0.15);
      cursor: pointer;
      text-align: left;
    }

    .options button:hover:not(:disabled) {
      background: rgba(255,255,255,0.15);
      border-color: #00ffea;
      transform: translateX(6px);
    }

    .options button::first-letter {
      font-weight: bold;
      color: #00ffea;
    }

    .options button.correct {
      background: #00ff9d !important;
      color: #000;
      font-weight: bold;
    }

    .options button.wrong {
      background: #ff4d6d !important;
      color: white;
    }

    #feedback {
      margin: 25px 0;
      font-size: 1.6rem;
      font-weight: bold;
      text-align: center;
    }

    #explanation {
      background: rgba(255,255,255,0.1);
      padding: 22px;
      border-radius: 14px;
      border-left: 6px solid #00ffea;
      margin: 25px 0;
      display: none;
    }

    .btn-group {
      display:flex;
      justify-content:center;
      gap:12px;
      flex-wrap: wrap;
      margin-top:20px;
    }

    button {
      padding:12px 20px;
      border:none;
      border-radius:30px;
      cursor:pointer;
      font-weight:bold;
    }

    #prev-btn { background:#888; color:white; }
    #next-btn { background:#00ffea; color:black; }
    #skip-btn { background:#ff9800; color:white; }

    .result-box {
      text-align:center;
      padding:40px;
    }

    .final-score {
      font-size:4rem;
      margin:15px 0;
      background: linear-gradient(to right, #00ffea, #ff00cc);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .percentage {
      font-size: 2rem;
      color: #00ff9d;
    }

    footer {
      background:#0f172a;
      text-align:center;
      padding:20px;
      margin-top:auto;
    }

    #retry-btn {
      margin-top: 15px;
      background: #ff4d6d;
      color: white;
      padding: 10px 20px;
      border-radius: 25px;
      cursor: pointer;
      font-weight: bold;
    }
  </style>
</head>

<body>

<div class="container">
  <h1>BTA Chemistry Quiz</h1>
  <p class="subtitle"Rate of Chemical Reactions Quiz Questions ready.</p>

  <p id="progress"></p>

  <div id="loading">
    <div class="spinner"></div>
    <p>Loading questions... please wait</p>
  </div>

  <div id="quiz-container" style="display:none;"></div>
</div>

<footer>
  <p>&copy; 2026 Bush Teaching Assistant</p>
</footer>

<script>
function shuffleArray(array) {
  for (let i = array.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [array[i], array[j]] = [array[j], array[i]];
  }
}

let allQuestions = [];
let currentIndex = 0;
let userAnswers = [];

async function loadQuestions() {
  const loadingEl = document.getElementById('loading');
  const quizEl = document.getElementById('quiz-container');

  loadingEl.style.display = 'block';  // always show spinner until loaded
  quizEl.style.display = 'none';

  try {
    const res = await fetch('https://bush-backend.onrender.com/questions');
    if (!res.ok) throw new Error('Network response was not ok');

    const data = await res.json();
    let questions = data.questions;

    if (!questions || questions.length === 0) {
      throw new Error('No questions found');
    }

    shuffleArray(questions);
    allQuestions = questions.slice(0, 30);
    userAnswers = new Array(allQuestions.length).fill(null);

    loadingEl.style.display = 'none';
    quizEl.style.display = 'block';

    showQuestion();

  } catch (error) {
    console.error(error);
    loadingEl.innerHTML = `
      <div class="spinner"></div>
      <p style="color:red; margin-top: 15px;">Failed to load questions. Please check your connection.</p>
      <button id="retry-btn" onclick="loadQuestions()">Retry</button>
    `;
  }
}

function showQuestion() {
  const q = allQuestions[currentIndex];

  document.getElementById('progress').textContent =
    `Question ${currentIndex + 1} of ${allQuestions.length}`;

  let optionsHTML = '';
  q.options.forEach(opt => {
    optionsHTML += `<button>${opt}</button>`;
  });

  document.getElementById('quiz-container').innerHTML = `
    <div class="question-card">
      <h2>${q.question}</h2>
      <div class="options">${optionsHTML}</div>
      <div id="feedback"></div>
      <div id="explanation"></div>

      <div class="btn-group">
        <button id="prev-btn" onclick="prev()">← Previous</button>
        <button id="skip-btn" onclick="skip()">Skip →</button>
        <button id="next-btn" onclick="next()" style="display:none;">Next</button>
      </div>
    </div>
  `;

  const buttons = document.querySelectorAll('.options button');

  buttons.forEach(btn => {
    btn.onclick = () => selectAnswer(btn, q);
  });

  // Disable previous/skip buttons when needed
  if (currentIndex === 0) {
    document.getElementById('prev-btn').disabled = true;
    document.getElementById('prev-btn').style.opacity = 0.5;
  }
  if (currentIndex === allQuestions.length - 1) {
    document.getElementById('skip-btn').disabled = true;
    document.getElementById('skip-btn').style.opacity = 0.5;
  }

  // Restore previous answers
  if (userAnswers[currentIndex] !== null) {
    const saved = userAnswers[currentIndex];
    buttons.forEach(btn => {
      const letter = btn.textContent.charAt(0);
      if (letter === q.answer) btn.classList.add('correct');
      if (letter === saved && saved !== q.answer) btn.classList.add('wrong');
      btn.disabled = true;
    });
    showExplanation(q);
    document.getElementById('next-btn').style.display = 'inline-block';
  }
}

function selectAnswer(btn, q) {
  const selected = btn.textContent.charAt(0);
  userAnswers[currentIndex] = selected;

  document.querySelectorAll('.options button').forEach(b => {
    b.disabled = true;
    const letter = b.textContent.charAt(0);

    if (letter === q.answer) b.classList.add('correct');
    if (b === btn && selected !== q.answer) b.classList.add('wrong');
  });

  const feedback = document.getElementById('feedback');

  if (selected === q.answer) {
    feedback.innerHTML = `<span style="color:#00ff9d;">✓ Correct!</span>`;
  } else {
    feedback.innerHTML = `<span style="color:#ff4d6d;">✗ Wrong!</span>`;
  }

  showExplanation(q);
  document.getElementById('next-btn').style.display = 'inline-block';
}

function showExplanation(q) {
  const exp = document.getElementById('explanation');
  exp.innerHTML = `<strong>Explanation:</strong><br>${q.explanation}`;
  exp.style.display = 'block';
}

function next() {
  currentIndex++;
  if (currentIndex >= allQuestions.length) return showScore();
  showQuestion();
}

function prev() {
  if (currentIndex > 0) {
    currentIndex--;
    showQuestion();
  }
}

function skip() {
  currentIndex++;
  if (currentIndex >= allQuestions.length) return showScore();
  showQuestion();
}

function showScore() {
  let score = 0;
  allQuestions.forEach((q, i) => {
    if (userAnswers[i] === q.answer) score++;
  });

  const total = allQuestions.length;
  const percent = Math.round((score / total) * 100);

  document.getElementById('quiz-container').innerHTML = `
    <div class="question-card result-box">
      <h2>Quiz Completed!</h2>
      <div class="final-score">${score}/${total}</div>
      <div class="percentage">${percent}%</div>
    </div>
  `;
}

window.onload = loadQuestions;
</script>

</body>
</html>
