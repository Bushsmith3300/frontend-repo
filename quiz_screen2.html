<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BTA Chemistry Quiz</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      min-height: 100vh;
      background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
      color: white;
      background-attachment: fixed;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      display: flex;
      flex-direction: column;
    }

    .container {
      max-width: 850px;
      margin: 40px auto;
      padding: 20px;
      flex: 1;
    }

    h1 {
      text-align: center;
      font-size: 3rem;
      margin-bottom: 10px;
      background: linear-gradient(to right, #00ffea, #ff00cc);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      text-shadow: 0 4px 15px rgba(0, 255, 234, 0.3);
    }

    .subtitle {
      text-align: center;
      font-size: 1.1rem;
      opacity: 0.85;
      margin-bottom: 40px;
    }

    .question-card {
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.15);
      padding: 35px;
      border-radius: 20px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
      margin-bottom: 30px;
      transition: transform 0.3s ease;
    }

    .question-card:hover {
      transform: translateY(-5px);
    }

    #progress {
      text-align: center;
      font-size: 1.3rem;
      margin-bottom: 20px;
      font-weight: 600;
      color: #00ffea;
    }

    /* Restart Message */
    #restart-message {
      text-align: center;
      font-size: 1.35rem;
      color: #00ff9d;
      background: rgba(0, 255, 157, 0.15);
      border: 1px solid #00ff9d;
      padding: 12px 20px;
      border-radius: 12px;
      margin-bottom: 20px;
      font-weight: bold;
      display: none;
    }

    h2 {
      font-size: 1.45rem;
      line-height: 1.5;
      margin-bottom: 30px;
      color: #ffffff;
    }

    .options button {
      display: block;
      width: 100%;
      padding: 16px 20px;
      margin: 12px 0;
      font-size: 1.05rem;
      border: 2px solid rgba(255, 255, 255, 0.2);
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.07);
      color: white;
      cursor: pointer;
      text-align: left;
      transition: all 0.3s ease;
    }

    .options button:hover:not(:disabled) {
      background: rgba(255, 255, 255, 0.15);
      border-color: #00ffea;
      transform: translateX(8px);
    }

    .options button.correct {
      background: #00c853 !important;
      border-color: #00c853;
      color: white;
      font-weight: bold;
    }

    .options button.wrong {
      background: #ff1744 !important;
      border-color: #ff1744;
      color: white;
    }

    #feedback {
      margin: 25px 0;
      font-size: 1.5rem;
      font-weight: bold;
      text-align: center;
    }

    #explanation {
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(8px);
      padding: 22px;
      border-radius: 14px;
      border-left: 6px solid #00ffea;
      margin: 25px 0;
      line-height: 1.6;
    }

    button#next-btn {
      display: block;
      margin: 25px auto 0;
      padding: 14px 40px;
      font-size: 1.1rem;
      background: linear-gradient(to right, #00ffea, #00b8d4);
      color: #000;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      font-weight: bold;
      box-shadow: 0 6px 20px rgba(0, 255, 234, 0.4);
      transition: all 0.3s ease;
    }

    button#next-btn:hover {
      transform: scale(1.05);
      box-shadow: 0 8px 25px rgba(0, 255, 234, 0.6);
    }
	
	
	 .a1{
      display: block;
      margin: 25px auto 0;
      padding: 14px 40px;
      font-size: 1.1rem;
      background: linear-gradient(to right, #00ffea, #00b8d4);
      color: #000;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      font-weight: bold;
      box-shadow: 0 6px 20px rgba(0, 255, 234, 0.4);
      transition: all 0.3s ease;
    }


   .a1:hover {
      transform: scale(1.05);
      box-shadow: 0 8px 25px rgba(0, 255, 234, 0.6);
	  }
	  

    /* Improved Score Styling */
    .result-card {
      text-align: center;
      padding: 60px 40px;
    }


    .final-score {
      font-size: 5.5rem;
      font-weight: bold;
      margin: 20px 0 10px 0;
      background: linear-gradient(to right, #00ffea, #ff00cc);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      line-height: 1;
    }

    .percentage {
      font-size: 3rem;
      font-weight: 600;
      color: #00ff9d;
      margin-bottom: 25px;
    }

    /* First Attempt Score - Refined */
    .first-attempt-box {
      background: rgba(255, 215, 0, 0.1);
      border: 1px solid #ffd700;
      border-radius: 12px;
      padding: 18px;
      margin: 25px auto;
      max-width: 400px;
    }

    .first-attempt-box p {
      font-size: 1.25rem;
      color: #ffd700;
      margin-bottom: 5px;
    }

    /* Footer */
    footer {
      background: rgba(0, 0, 0, 0.4);
      backdrop-filter: blur(10px);
      border-top: 1px solid rgba(255, 255, 255, 0.1);
      padding: 25px 0;
      text-align: center;
      margin-top: auto;
      color: rgba(255, 255, 255, 0.7);
      font-size: 0.95rem;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>BTA Chemistry Quiz</h1>
    <p class="subtitle">Test your knowledge in Chemical Kinetics & Rate of Reaction</p>
    
    <p id="progress"></p>
    
    <!-- Restart Message -->
    <div id="restart-message">✓ Quiz Restarted!</div>
    
    <div id="quiz-container"></div>
  </div>
  


  <!-- Footer -->
  <footer>
    <p>&copy; 2026 Bush Teaching Assistant. All rights reserved.</p>
    <p>Connecting learners and facilitators everywhere!</p><br>
    <p>This website is developed and owned by Emmanuel Asiamah Amponsah...@EAA software...</p>
  </footer>

  <script>
    let allQuestions = [];
    let currentIndex = 0;
    let score = 0;
    let firstAttemptScore = null;   // Stores the very first attempt score
    let hasRestarted = false;

    async function loadQuestions(isRestart = false) {
      try {
        const response = await fetch('https://bush-backend.onrender.com/questions');
        if (!response.ok) throw new Error('Failed to fetch, Contact Author(Bush)');

        const data = await response.json();
        if (data.status === "success") {
          allQuestions = data.questions;
          currentIndex = 0;
          score = 0;

          if (isRestart) {
            hasRestarted = true;
            document.getElementById('restart-message').style.display = 'block';
          } else {
            firstAttemptScore = null;   // Reset on fresh load
          }

          showCurrentQuestion();
        }
      } catch (err) {
        document.getElementById('quiz-container').innerHTML = 
          `<p style="color:red; text-align:center; font-size:1.3rem;">
            Cannot connect to Flask server.<br> <a class="a1" href="https://wa.me/233554454161" target="_blank">
			Contact Author (Bush)</a>
           </p>`;
      }
    }

    function showCurrentQuestion() {
      if (currentIndex >= allQuestions.length) {
        showFinalResult();
        return;
      }

      const q = allQuestions[currentIndex];
      const container = document.getElementById('quiz-container');
      document.getElementById('progress').textContent = `Question ${currentIndex + 1} of ${allQuestions.length}`;

      let optionsHTML = '';
      q.options.forEach(option => {
        optionsHTML += `<button>${option}</button>`;
      });

      container.innerHTML = `
        <div class="question-card">
          <h2>${q.question}</h2>
          <div class="options" id="options-container">
            ${optionsHTML}
          </div>
          <div id="feedback"></div>
          <div id="explanation" style="display: none;"></div>
          <button id="next-btn" style="display: none;" onclick="nextQuestion()">Next Question →</button>
        </div>
      `;

      const buttons = document.querySelectorAll('#options-container button');
      buttons.forEach(button => {
        button.addEventListener('click', () => handleAnswer(button, q));
      });
    }

    function handleAnswer(clickedButton, currentQ) {
      const selectedText = clickedButton.textContent.trim();
      const userLetter = selectedText.charAt(0);
      const correctLetter = currentQ.answer;

      document.querySelectorAll('#options-container button').forEach(btn => {
        btn.disabled = true;
        const letter = btn.textContent.trim().charAt(0);

        if (letter === correctLetter) btn.classList.add('correct');
        if (btn === clickedButton && letter !== correctLetter) btn.classList.add('wrong');
      });

      const feedbackEl = document.getElementById('feedback');
      if (userLetter === correctLetter) {
        score++;
        feedbackEl.innerHTML = `<span style="color: #00ff9d;">✓ Correct!</span>`;
      } else {
        feedbackEl.innerHTML = `<span style="color: #ff4d6d;">✗ Wrong! The correct answer is ${correctLetter}.</span>`;
      }

      const expEl = document.getElementById('explanation');
      expEl.innerHTML = `<strong>Explanation:</strong><br>${currentQ.explanation}`;
      expEl.style.display = 'block';

      document.getElementById('next-btn').style.display = 'block';
    }

    function nextQuestion() {
      currentIndex++;
      showCurrentQuestion();
    }

    function showFinalResult() {
      const total = allQuestions.length;
      const percentage = Math.round((score / total) * 100);

      // Save first attempt score only on the very first completion
      if (firstAttemptScore === null) {
        firstAttemptScore = score;
      }

      let html = `
        <div class="question-card result-card">
          <h2>Quiz Completed!</h2>
          
          <div class="final-score">${score} / ${total}</div>
          <div class="percentage">${percentage}%</div>
		<div>
          <a class="a1" href="https://wa.me/233554454161" target="_blank">
		  Take Screenshot of this page and click here to send your score to Bush</a> 		
		</div>		
      `;
	  
	  

      // Show refined First Attempt Score if user has restarted
      if (hasRestarted && firstAttemptScore !== null) {
        const firstPercent = Math.round((firstAttemptScore / total) * 100);
        html += `
          <div class="first-attempt-box">
            <p>First Attempt Score</p>
            <strong>${firstAttemptScore} / \( {total} ( \){firstPercent}%)</strong>
          </div>
        `;
      }

      html += `
          <button onclick="restartQuiz()" style="padding:16px 50px; font-size:1.2rem; margin-top:30px; cursor: pointer;">
            Restart Quiz
          </button>
        </div>
		
		<div>
	    <a class=a1 href ="contactpage.html">Contact Author</a>	
        </div>`
	  ;

      document.getElementById('quiz-container').innerHTML = html;

      if (hasRestarted) {
        document.getElementById('restart-message').style.display = 'block';
      }
    }

    function restartQuiz() {
      loadQuestions(true);
    }

    // Initial load - no restart message
    window.onload = () => loadQuestions(false);
  </script>
</body>
</html>
