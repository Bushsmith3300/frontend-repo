<!DOCTYPE html>
<html lang="en">
<head>
  
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Standard Chemistry Questions for Ghanaian SHS Learners!">
  <meta name="author" content="Emmanuel Asiamah Amponsah">
  
  <title>Chemistry Quiz</title>

  <style>
    * { margin:0; padding:0; box-sizing:border-box; }

    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      min-height: 100vh;
      background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
      color: white;
      display: flex;
      flex-direction: column;
    }

    .container {
      max-width: 850px;
      margin: 40px auto;
      padding: 20px;
      flex: 1;
    }

    h1 {
      text-align: center;
      font-size: 3rem;
      margin-bottom: 10px;
      background: linear-gradient(to right, #00ffea, #ff00cc);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .subtitle {
      text-align: center;
      margin-bottom: 40px;
      opacity: 0.85;
    }

    #loading { text-align:center; margin-top:80px; }

    .spinner {
      width: 65px;
      height: 65px;
      margin:auto;
      border:6px solid rgba(255,255,255,0.15);
      border-top:6px solid #00ffea;
      border-radius:50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .question-card {
      background: rgba(255,255,255,0.08);
      padding: 35px;
      border-radius: 20px;
      margin-bottom: 30px;
    }

    #progress {
      text-align:center;
      font-size:1.3rem;
      margin-bottom:20px;
      color:#00ffea;
    }

    .options button {
      width:100%;
      padding:16px;
      margin:10px 0;
      border-radius:12px;
      background: rgba(255,255,255,0.07);
      color:white;
      border:none;
      cursor:pointer;
    }

    .options button.correct { background:#00ff9d !important; color:#000; }
    .options button.wrong { background:#ff4d6d !important; }

    #feedback {
      text-align:center;
      margin:20px 0;
      font-size:1.4rem;
      font-weight:bold;
    }

    #explanation {
      background: rgba(255,255,255,0.1);
      padding:20px;
      border-left:6px solid #00ffea;
      margin-top:20px;
      display:none;
    }

    .btn-group {
      display:flex;
      justify-content:center;
      gap:12px;
      margin-top:20px;
      flex-wrap: wrap;
    }

    button {
      padding:12px 20px;
      border:none;
      border-radius:30px;
      cursor:pointer;
      font-weight:bold;
    }

    #prev-btn { background:#888; color:white; }
    #next-btn { background:#00ffea; color:black; }
    #skip-btn { background:#ff9800; color:white; }

    .result-box {
      text-align:center;
    }

    .final-score {
      font-size:4rem;
      margin:10px 0;
      background: linear-gradient(to right, #00ffea, #ff00cc);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    footer {
      background:#0f172a;
      text-align:center;
      padding:20px;
      margin-top:auto;
    }
  </style>
</head>

<body>

<div class="container">
  <h1>BTA Chemistry Quiz</h1>
  <p class="subtitle">Test your knowledge in Organic Chemistry (alkanes)</p>

  <p id="progress"></p>

  <div id="loading">
    <div class="spinner"></div>
    <p>Loading questions...</p>
  </div>

  <div id="quiz-container" style="display:none;"></div>
</div>

<footer>
  <p>&copy; 2026 Bush Teaching Assistant</p>
</footer>

<script>
let allQuestions = [];
let currentIndex = 0;
let userAnswers = [];

async function loadQuestions() {
  const res = await fetch('https://bush-backend.onrender.com/questions');
  const data = await res.json();

  allQuestions = data.questions;
  userAnswers = new Array(allQuestions.length).fill(null);

  document.getElementById('loading').style.display = 'none';
  document.getElementById('quiz-container').style.display = 'block';

  showQuestion();
}

function showQuestion() {
  const q = allQuestions[currentIndex];

  document.getElementById('progress').textContent =
    `Question ${currentIndex + 1} of ${allQuestions.length}`;

  let optionsHTML = '';
  q.options.forEach(opt => {
    optionsHTML += `<button>${opt}</button>`;
  });

  document.getElementById('quiz-container').innerHTML = `
    <div class="question-card">
      <h2>${q.question}</h2>
      <div class="options">${optionsHTML}</div>
      <div id="feedback"></div>
      <div id="explanation"></div>

      <div class="btn-group">
        <button id="prev-btn" onclick="prev()">← Previous</button>
        <button id="skip-btn" onclick="skip()">Skip →</button>
        <button id="next-btn" onclick="next()" style="display:none;">Next</button>
      </div>
    </div>
  `;

  const buttons = document.querySelectorAll('.options button');

  buttons.forEach(btn => {
    btn.onclick = () => selectAnswer(btn, q);
  });

  // restore previous answer
  if (userAnswers[currentIndex] !== null) {
    const saved = userAnswers[currentIndex];
    buttons.forEach(btn => {
      const letter = btn.textContent.charAt(0);
      if (letter === q.answer) btn.classList.add('correct');
      if (letter === saved && saved !== q.answer) btn.classList.add('wrong');
      btn.disabled = true;
    });

    showExplanation(q);
    document.getElementById('next-btn').style.display = 'inline-block';
  }
}

function selectAnswer(btn, q) {
  const selected = btn.textContent.charAt(0);
  userAnswers[currentIndex] = selected;

  document.querySelectorAll('.options button').forEach(b => {
    b.disabled = true;
    const letter = b.textContent.charAt(0);

    if (letter === q.answer) b.classList.add('correct');
    if (b === btn && selected !== q.answer) b.classList.add('wrong');
  });

  const feedback = document.getElementById('feedback');

  if (selected === q.answer) {
    feedback.innerHTML = `<span style="color:#00ff9d;">✓ Correct!</span>`;
  } else {
    feedback.innerHTML = `<span style="color:#ff4d6d;">✗ Wrong!</span>`;
  }

  showExplanation(q);
  document.getElementById('next-btn').style.display = 'inline-block';
}

function showExplanation(q) {
  const exp = document.getElementById('explanation');
  exp.innerHTML = `<strong>Explanation:</strong><br>${q.explanation}`;
  exp.style.display = 'block';
}

function next() {
  currentIndex++;
  if (currentIndex >= allQuestions.length) return showScore();
  showQuestion();
}

function prev() {
  if (currentIndex > 0) {
    currentIndex--;
    showQuestion();
  }
}

function skip() {
  currentIndex++;
  if (currentIndex >= allQuestions.length) return showScore();
  showQuestion();
}

function showScore() {
  let score = 0;
  allQuestions.forEach((q, i) => {
    if (userAnswers[i] === q.answer) score++;
  });

  const total = allQuestions.length;
  const percent = Math.round((score / total) * 100);

  document.getElementById('quiz-container').innerHTML = `
    <div class="question-card result-box">
      <h2>Quiz Completed!</h2>
      <div class="final-score">${score}/${total}</div>
      <p style="font-size:1.5rem;color:#00ff9d;">${percent}%</p>
    </div>
  `;
}

window.onload = loadQuestions;
</script>

</body>
</html>
