<!DOCTYPE html>
<html lang="en">
<head>
  
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Standard Chemistry Questions for Ghanaian SHS Learners!">
  <meta name="author" content="Emmanuel Asiamah Amponsah">
  <meta name="keywords" content="chemistry, past questions, WAEC, teaching assistant, asiamah, learn">
  
  <title>Chemistry Quiz</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      min-height: 100vh;
      background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
      color: white;
      display: flex;
      flex-direction: column;
    }

    .container {
      max-width: 850px;
      margin: 40px auto;
      padding: 20px;
      flex: 1;
    }

    h1 {
      text-align: center;
      font-size: 3rem;
      margin-bottom: 10px;
      background: linear-gradient(to right, #00ffea, #ff00cc);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .subtitle {
      text-align: center;
      font-size: 1.1rem;
      opacity: 0.85;
      margin-bottom: 40px;
    }

    /* 🔥 LOADING */
    #loading {
      text-align: center;
      margin-top: 80px;
    }

    #loading p {
      margin-top: 15px;
      font-size: 1.3rem;
      color: #00ffea;
      font-weight: 500;
    }

    .spinner {
      width: 65px;
      height: 65px;
      margin: auto;
      border: 6px solid rgba(255,255,255,0.15);
      border-top: 6px solid #00ffea;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .question-card {
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.15);
      padding: 35px;
      border-radius: 20px;
      margin-bottom: 30px;
    }

    #progress {
      text-align: center;
      font-size: 1.3rem;
      margin-bottom: 20px;
      font-weight: 600;
      color: #00ffea;
    }

    h2 {
      font-size: 1.45rem;
      margin-bottom: 30px;
    }

    .options button {
      width: 100%;
      padding: 16px 20px;
      margin: 12px 0;
      font-size: 1.05rem;
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.07);
      color: white;
      cursor: pointer;
      border: none;
    }

    .options button.correct {
      background: #00ff9d !important;
      color: #000;
      font-weight: bold;
    }

    .options button.wrong {
      background: #ff4d6d !important;
      color: white;
    }

    #feedback {
      margin: 25px 0;
      font-size: 1.5rem;
      font-weight: bold;
      text-align: center;
    }

    #explanation {
      background: rgba(255, 255, 255, 0.1);
      padding: 22px;
      border-radius: 14px;
      border-left: 6px solid #00ffea;
      margin: 25px 0;
      line-height: 1.6;
    }

    #next-btn {
      display: block;
      margin: 25px auto 0;
      padding: 14px 40px;
      font-size: 1.1rem;
      background: linear-gradient(to right, #00ffea, #00b8d4);
      color: #000;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      font-weight: bold;
    }

    footer {
      background: #0f172a;
      text-align: center;
      padding: 20px;
      margin-top: auto;
    }
  </style>
</head>

<body>

<div class="container">
  <h1>BTA Chemistry Quiz</h1>
  <p class="subtitle">Test your knowledge in Chemical Kinetics</p>

  <p id="progress"></p>

  <!-- ✅ LOADING -->
  <div id="loading">
    <div class="spinner"></div>
    <p>Loading questions... please wait</p>
  </div>

  <!-- QUIZ -->
  <div id="quiz-container" style="display:none;"></div>
</div>

<footer>
  <p>&copy; 2026 Bush Teaching Assistant</p>
</footer>

<script>
let allQuestions = [];
let currentIndex = 0;
let score = 0;

async function loadQuestions() {
  const loading = document.getElementById('loading');
  const quiz = document.getElementById('quiz-container');

  loading.style.display = 'block';
  quiz.style.display = 'none';

  try {
    const response = await fetch('https://bush-backend.onrender.com/questions');
    const data = await response.json();

    allQuestions = data.questions;

    loading.style.display = 'none';
    quiz.style.display = 'block';

    showQuestion();

  } catch (err) {
    loading.style.display = 'none';
    quiz.style.display = 'block';

    quiz.innerHTML = `<p style="color:red;text-align:center;">
      Failed to load questions.
    </p>`;
  }
}

function showQuestion() {
  const q = allQuestions[currentIndex];

  document.getElementById('progress').textContent =
    `Question ${currentIndex + 1} of ${allQuestions.length}`;

  let optionsHTML = '';
  q.options.forEach(opt => {
    optionsHTML += `<button>${opt}</button>`;
  });

  document.getElementById('quiz-container').innerHTML = `
    <div class="question-card">
      <h2>${q.question}</h2>
      <div class="options">${optionsHTML}</div>
      <div id="feedback"></div>
      <div id="explanation" style="display:none;"></div>
      <button id="next-btn" style="display:none;" onclick="next()">Next Question
      </button>
    </div>
  `;

  document.querySelectorAll('.options button').forEach(btn => {
    btn.onclick = () => handleAnswer(btn, q);
  });
}

function handleAnswer(btn, q) {
  const selected = btn.textContent.charAt(0);
  const correct = q.answer;

  document.querySelectorAll('.options button').forEach(b => {
    b.disabled = true;

    if (b.textContent.charAt(0) === correct) {
      b.classList.add('correct');
    }

    if (b === btn && selected !== correct) {
      b.classList.add('wrong');
    }
  });

  const feedback = document.getElementById('feedback');

  if (selected === correct) {
    score++;
    feedback.innerHTML = `<span style="color:#00ff9d;">✓ Correct!</span>`;
  } else {
    feedback.innerHTML = `<span style="color:#ff4d6d;">✗ Wrong!</span>`;
  }

  const exp = document.getElementById('explanation');
  exp.innerHTML = `<strong>Explanation:</strong><br>${q.explanation}`;
  exp.style.display = 'block';

  document.getElementById('next-btn').style.display = 'block';
}

function next() {
  currentIndex++;
  if(currentIndex >= allQuestions.length){
    document.getElementById('quiz-container').innerHTML =
      `<h2>Score: ${score}/${allQuestions.length}</h2>`;
  } else {
    showQuestion();
  }
}

window.onload = loadQuestions;
</script>

</body>
</html>
