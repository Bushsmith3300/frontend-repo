<!DOCTYPE html>
<html lang="EN-US">
<head>
    <title>Bush Teaching Assistant</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&family=Playfair+Display:wght@700&display=swap');

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #0d1117 0%, #1f2937 100%);
            color: #e2e8f0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* TOP BAR */
        .top-bar {
            height: 5px;
            background: linear-gradient(to right, #3b82f6, #60a5fa);
        }

        /* HERO */
        .hero {
            text-align: center;
            padding: 60px 20px 30px;
        }

        .hero h1 {
            font-family: 'Playfair Display', serif;
            font-size: 2.5rem;
            background: linear-gradient(90deg, #3b82f6, #60a5fa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }

        .hero p {
            color: #cbd5e1;
            font-size: 1.05rem;
        }

        /* MAIN */
        .main-content {
            flex: 1;
            max-width: 1000px;
            margin: 0 auto;
            padding: 30px 20px;
        }

        /* SUBJECT GRID */
        .subject-links {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(230px, 1fr));
            gap: 20px;
            margin-top: 25px;
        }

        .subject-links a {
            background: rgba(20, 25, 40, 0.95);
            padding: 22px;
            text-align: center;
            text-decoration: none;
            color: #e2e8f0;
            border-radius: 14px;
            font-size: 1.05rem;
            font-weight: 500;
            border: 1px solid #3b82f6;
            transition: 0.3s;
            box-shadow: 0 8px 25px rgba(0,0,0,0.5);
        }

        .subject-links a:hover {
            transform: translateY(-4px);
            background: linear-gradient(135deg, #3b82f6, #2563eb);
            color: #fff;
            box-shadow: 0 12px 30px rgba(59,130,246,0.7);
        }

        /* NAV */
        .nav-links {
            text-align: center;
            margin: 45px 0 25px;
        }

        .nav-links a {
            display: inline-block;
            padding: 12px 28px;
            margin: 8px;
            text-decoration: none;
            color: white;
            font-size: 0.95rem;
            border-radius: 30px;
            background: linear-gradient(135deg, #3b82f6, #2563eb);
            transition: 0.3s;
            box-shadow: 0 6px 20px rgba(59,130,246,0.5);
        }

        .nav-links a:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(59,130,246,0.7);
        }

        /* FOOTER */
        .footer {
            background: #0b0f1a;
            color: #cbd5f0;
            text-align: center;
            padding: 25px 15px;
            font-size: 0.9rem;
            border-top: 2px solid #3b82f6;
        }

        .footer-content p {
            margin: 6px 0;
        }

        /* MOBILE */
        @media (max-width: 600px) {
            .hero h1 {
                font-size: 2rem;
            }
        }

    </style>
</head>

<body>

    <div class="top-bar"></div>

    <!-- HERO -->
    <section class="hero">
        <h1>
            <abbr title="Bush Teaching Assistant">BTA</abbr> Subject-based Learning Tools
        </h1>
        <p>Choose a Subject</p>
    </section>

    <!-- MAIN -->
    <div class="main-content">

        <div class="subject-links">
            <a href="announcement_page.html">BTA<sub>CHEM</sub></a>
            <a href="contactpage.html">BTA<sub>PHYSICS</sub></a>
            <a href="contactpage.html">BTA<sub>E-MATH</sub></a>
            <a href="contactpage.html">BTA<sub>BIOLOGY</sub></a>
            <a href="contactpage.html">BTA<sub>ENGLISH</sub></a>
            <a href="contactpage.html">BTA<sub>SOCIAL STUDIES</sub></a>
            <a href="contactpage.html">BTA<sub>CORE-MATH</sub></a>
            <a href="contactpage.html">BTA<sub>INTEGRATED SCIENCE</sub></a>
        </div>

        <div class="nav-links">
            <a href="aboutpage.html">← Back</a>
            <a href="index.html">Home</a>
            <a href="contactpage.html">Contact Author</a>
        </div>

    </div>

    <!-- FOOTER -->
    <footer class="footer">
        <div class="footer-content">
            <p>&copy; 2026 Bush Teaching Assistant</p>
            <p>Connecting learners and educators</p>
            <p>Developed by Emmanuel Asiamah Amponsah</p>
        </div>
    </footer>

</body>
</html>
